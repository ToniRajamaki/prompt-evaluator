# Local Postgres + pgvector for the SourceChat RAG backend.
#
#   docker compose up -d
#
# The backend connects via DATABASE_URL (see backend/.env.example). Data is
# persisted in the named volume `pgdata` so restarts keep your documents.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sourcechat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sourcechat
      POSTGRES_PASSWORD: sourcechat
      POSTGRES_DB: sourcechat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcechat -d sourcechat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
